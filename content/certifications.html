<!-- Certifications Main Content -->
<div class="certificationMainContent">

    <!-- Certification Banner -->
    <div class="certificationBanner">
        <div class="certificationBannerContent">
            <h1>Certifications</h1>
            <p>A collection of certifications, online courses, and learning achievements that support my journey as an aspiring Software Engineer.</p>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="certificationFilterContainer">
        <div class="certificationCategories" id="certificationCategories">
            
            <!-- Certification Categories Here-->

        </div>
        <div class="certificationControls">
            <div class="certificationSearch">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="search" placeholder="Search certifications..." name="certificationSearchInput" id="certificationSearchInput" class="searchInput">
            </div>
        </div>
    </div>

    <!-- Certification Cards -->
    <div class="certificationContainer" id="certificationContainer">

        <!-- Populated Certification Cards Here -->

    </div>

</div>

<!-- Certification Right Panel -->
<div class="certificationRightPanel">

    <!-- Certification Stats -->
    <div class="certificationStatsContainer">
        <div class="certificationStatsTitle">
            <i class="fa-solid fa-chart-simple"></i>
            <span>Certification Stats</span>
        </div>
        <div class="certificationStats">
            <div class="certificationStatCard">
                <span class="certificationStatsValue" id="totalCertifications">0</span>
                <span class="certificationStatsLabel">Total</span>
            </div>
            <div class="certificationStatCard">
                <span class="certificationStatsValue" id="verifiedCertifications">0</span>
                <span class="certificationStatsLabel">Completed</span>
            </div>
            <div class="certificationStatCard">
                <span class="certificationStatsValue" id="inProgressCertifications">0</span>
                <span class="certificationStatsLabel">Active</span>
            </div>
        </div>
    </div>

    <!-- Latest Certification -->
    <div class="latestCertificationContainer">
        <div class="latestCertificationTitle">
            <i class="fa-solid fa-star"></i>
            <span>Latest Certification</span>
        </div>
        <div id="latestCertification">
            <!-- Latest Certification -->
        </div>
    </div>

    <!-- Certification Platforms Breakdown -->
    <div class="certificationPlatformsContainer">
        <div class="certificationPlatformsTitle">
            <i class="fa-solid fa-globe"></i>
            <span>Platforms</span>
        </div>
        <div class="platformList" id="platformList">
            <!-- Platform List -->
        </div>
    </div>

    <!-- Contacts -->
    <div class="contactContainer">
        <div class="contactHeader">
            <div class="contactTitle">
                <i class="fa-solid fa-comment"></i>
                <span>Get in Touch</span>
            </div>
        </div>
        <div class="contactContent">
            <a href="#" class="contactButton">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-regular fa-envelope"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
        </div>
        <div class="contactLabel">
            <span>Let's connect and build something great</span>
        </div>
    </div>

</div>
