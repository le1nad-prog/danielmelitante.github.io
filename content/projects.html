<!-- Project Main Content -->
<div class="projectMainContent">

    <!-- Project Banner -->
    <div class="projectsBanner">
        <div class="projectsBannerContent">
            <h1>Projects</h1>
            <p>A collection of projects I've built — from web applications to UI designs.</p>
        </div>
    </div>

    <!-- Project Search, Filter, Sort and View Grids -->
    <div class="projectFilterContainer">
        
        <div class="projectCategories" id="projectCategories">
            
            <!-- Project Categories Here-->

        </div>

        <div class="projectControls">
            <div class="projectSearch">
                <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" class="searchInput" placeholder="Search projects...">
            </div>
            <div class="projectActions">
                <button class="sortButton">
                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                    <span>Sort</span>
                </button>
                <div class="divider"></div>
                <div class="viewToggleGroup">
                    <button class="viewToggleButton active">
                        <i class="fa-solid fa-grip"></i>
                    </button>
                    <button class="viewToggleButton">
                        <i class="fa-solid fa-list"></i>
                    </button>
                </div>

                <!-- Mobile Filter -->
                <button class="mobileFilterButton" id="mobileFilterBtn">
                    <i class="fa-solid fa-sliders"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Project List -->
    <div class="projectContainer" id="projectContainer">
        
        <!-- Populated Project Cards Here -->

    </div>

</div>

<!-- Project Right Panel -->
<div class="projectRightPanel">

    <!-- Project Stats -->
    <div class="projectStatsContainer">
        <div class="projectStatsTitle">
            <i class="fa-solid fa-chart-simple"></i>
            <span>Project Stats</span>
        </div>
        <div class="projectStats">
            <div class="projectStatCard">
                <span class="projectStatsValue" id="totalProjects">0</span>
                <span class="projectStatsLabel">Total</span>
            </div>
            <div class="projectStatCard">
                <span class="projectStatsValue" id="completedProjects">0</span>
                <span class="projectStatsLabel">Completed</span>
            </div>
            <div class="projectStatCard">
                <span class="projectStatsValue" id="activeProjects">0</span>
                <span class="projectStatsLabel">Active</span>
            </div>
        </div>
    </div>

    <!-- Tech Breakdown -->
    <div class="techBreakdownContainer">
        <div class="techBreakdownTitle">
            <i class="fa-solid fa-layer-group"></i>
            <span>Tech Breakdown</span>
        </div>
        <div class="techBreakdownList" id="techBreakdownList">
            <!-- Tech Breakdown List -->
        </div>
    </div>

    <!-- Featured Project -->
    <div class="featuredProjectContainer">
        <div id="featuredProject">
            <!-- Featured Project -->
        </div>
    </div>

    <!-- Contacts -->
    <div class="contactContainer">
        <div class="contactHeader">
            <div class="contactTitle">
                <i class="fa-solid fa-comment"></i>
                <span>Get in Touch</span>
            </div>
        </div>
        <div class="contactContent">
            <a href="#" class="contactButton">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-regular fa-envelope"></i>
            </a>
            <a href="#" class="contactButton">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
        </div>
        <div class="contactLabel">
            <span>Let's connect and build something great</span>
        </div>
    </div>

</div>
